kind = "web"
previewPath = "/chess-arena/"
title = "Chess Arena"
version = "1.0.0"
id = "artifacts/chess-arena"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/chess-arena/" ]
localPort = 23231

[services.development]
run = "pnpm --filter @workspace/chess-arena run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chess-arena", "run", "build" ]
publicDir = "artifacts/chess-arena/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23231"
BASE_PATH = "/chess-arena/"
